<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How Much Do You Know Me? ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
padding:20px;
}

.card{
background:white;
width:100%;
max-width:700px;
padding:35px;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,.2);
text-align:center;
position:relative;
z-index:2;
}

h1{
color:#ff4d88;
margin-bottom:20px;
}

.question{
font-size:1.3rem;
margin-bottom:25px;
font-weight:600;
color:#333;
}

.answer{
width:100%;
padding:15px;
margin:8px 0;
border:none;
border-radius:15px;
background:#ff4d88;
color:white;
font-size:1rem;
cursor:pointer;
transition:.25s;
}

.answer:hover{
transform:scale(1.03);
}

.progress{
margin-bottom:20px;
color:#888;
font-size:0.95rem;
}

#result{
display:none;
}

.score{
font-size:3rem;
color:#ff4d88;
font-weight:bold;
margin:20px 0;
}

.message{
font-size:1.3rem;
margin-top:15px;
}

.playAgain{
margin-top:25px;
padding:15px 30px;
border:none;
border-radius:15px;
background:#ff4d88;
color:white;
font-size:1rem;
cursor:pointer;
}

.heart{
position:fixed;
top:-50px;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
to{
transform:translateY(110vh);
opacity:0;
}
}

</style>
</head>
<body>

<div class="card">

<div id="quiz">

<h1>❤️ How Much Do You Know Me? ❤️</h1>

<div class="progress" id="progress"></div>

<div class="question" id="question"></div>

<div id="answers"></div>

</div>

<div id="result">

<h1>Quiz Finished ❤️</h1>

<div class="score" id="score"></div>

<div class="message" id="message"></div>

<button class="playAgain" onclick="location.reload()">
Play Again ❤️
</button>

</div>

</div>

<script>

const questions = [

{
question:"1. Motorku dari pabrik apa?",
answers:[
"Yamaha",
"Honda",
"Suzuki",
"Kawasaki"
],
correct:2
},

{
question:"2. Kalau aku sunmori biasanya ke mana?",
answers:[
"Sentul",
"Puncak",
"Alam Sutera",
"BSD"
],
correct:3
},

{
question:"3. Ulang tahunku kapan?",
answers:[
"13 Maret 2001",
"31 April 2001",
"13 April 2001",
"14 April 2001"
],
correct:2
},

{
question:"4. Makanan kesukaanku?",
answers:[
"Ayam Geprek",
"Chicken Katsu",
"Chicken Steak",
"Fried Chicken"
],
correct:3
},

{
question:"5. Hal yang paling kutakutkan dalam relationship?",
answers:[
"Long Distance",
"Kurang Komunikasi",
"Kehilangan Perasaan",
"Cheating"
],
correct:3
},

{
question:"6. Dari semua nama ini yang mana yang temenku?",
answers:[
"Firman",
"Andika",
"Dimas",
"Julfahmi"
],
correct:2
},

{
question:"7. Nama kucing kesukaanku?",
answers:[
"Oren",
"Oyan",
"Oyen",
"Oyyen"
],
correct:2
},

{
question:"8. Kalau aku menang lottery 10 miliar, aku bakal...",
answers:[
"Beli rumah",
"Beli ZX-25RR",
"Investasi",
"Tetap sayang kamu ❤️"
],
correct:3
}

];

let current = 0;
let score = 0;

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const progressEl = document.getElementById("progress");

function loadQuestion(){

const q = questions[current];

progressEl.innerText =
`Question ${current+1} / ${questions.length}`;

questionEl.innerText = q.question;

answersEl.innerHTML = "";

q.answers.forEach((answer,index)=>{

const btn = document.createElement("button");

btn.className = "answer";
btn.innerText = answer;

btn.onclick = ()=>{

if(index === q.correct){
score++;
}

current++;

if(current < questions.length){
loadQuestion();
}
else{
showResult();
}

};

answersEl.appendChild(btn);

});

}

function showResult(){

document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("score").innerText =
`${score}/${questions.length}`;

let message = "";

if(score === questions.length){

message =
`💍 PERFECT SCORE 💍

You officially know Aldizar better than most people.

Reward:
❤️ Cintakuh yang unlimitit ❤️

Valid Until:
Forever ♾️`;

spawnHearts(120);

}

else if(score >= 6){

message =
`❤️ Not bad sayang ❤️

You know me pretty well hehe.`;

spawnHearts(60);

}

else if(score >= 4){

message =
`😒😒😒 Hmmmm...`;

spawnHearts(30);

}

else{

message =
`😒😒😒😒`;

}

document.getElementById("message").innerText =
message;

}

function spawnHearts(amount){

for(let i=0;i<amount;i++){

const heart = document.createElement("div");

heart.className = "heart";

heart.innerHTML = "❤️";

heart.style.left = Math.random()*100+"vw";

heart.style.fontSize =
(Math.random()*30+15)+"px";

heart.style.animationDuration =
(Math.random()*4+3)+"s";

document.body.appendChild(heart);

}

}

loadQuestion();

</script>

</body>
</html>
